<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survival Voxel Game</title>
    <style>
      body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Courier New', Courier, monospace; user-select: none; }
      #app { width: 100vw; height: 100vh; }
      #crosshair {
        position: absolute;
        top: 50%; left: 50%;
        width: 20px; height: 20px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }
      #crosshair::before, #crosshair::after {
        content: ''; position: absolute; background-color: rgba(255, 255, 255, 0.8);
        mix-blend-mode: difference;
      }
      #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
      #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
      
      #ui-layer {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
        display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="crosshair"></div>
    <div id="ui-layer"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
