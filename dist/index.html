<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survival Voxel Game</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: #87CEEB;
      font-family: 'Courier New', Courier, monospace;
      user-select: none;
    }

    #app {
      width: 100vw;
      height: 100vh;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 20px;
      height: 20px;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: '';
      position: absolute;
      background-color: rgba(255, 255, 255, 0.8);
      mix-blend-mode: difference;
    }

    #crosshair::before {
      top: 9px;
      left: 0;
      width: 20px;
      height: 2px;
    }

    #crosshair::after {
      top: 0;
      left: 9px;
      width: 2px;
      height: 20px;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
    }

    #chat-container {
      position: absolute;
      bottom: 80px;
      left: 20px;
      width: 300px;
      height: 200px;
      display: flex;
      flex-direction: column;
      pointer-events: none;
      z-index: 500;
    }

    #chat-history {
      flex-grow: 1;
      overflow-y: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      color: white;
      text-shadow: 1px 1px 0 #000;
      font-size: 14px;
      margin-bottom: 5px;
    }

    #chat-history .chat-msg {
      margin: 2px 0;
      background: rgba(0, 0, 0, 0.3);
      padding: 2px 5px;
      border-radius: 3px;
      word-wrap: break-word;
    }

    #chat-input-container {
      display: none;
      pointer-events: auto;
    }

    #chat-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.5);
      border: 2px solid #555;
      color: white;
      padding: 5px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      outline: none;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-DoRfBn-6.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-x1XGuNl0.css">
</head>

<body>
  <div id="app"></div>
  <div id="crosshair"></div>

  <div id="chat-container">
    <div id="chat-history"></div>
    <div id="chat-input-container">
      <input type="text" id="chat-input" autocomplete="off" maxlength="100" />
    </div>
  </div>

  <div id="ui-layer"></div>
</body>

</html>
